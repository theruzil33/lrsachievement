spring:
  application:
    name: lrsachievement
  session:
    store-type: none

server:
  port: 8080

twitch:
  client-id: ${TWITCH_CLIENT_ID}
  client-secret: ${TWITCH_CLIENT_SECRET}
  redirect-uri: ${TWITCH_REDIRECT_URI:http://localhost:8080/auth/twitch/callback}

youtube:
  client-id: ${YOUTUBE_CLIENT_ID:}
  client-secret: ${YOUTUBE_CLIENT_SECRET:}
  redirect-uri: ${YOUTUBE_REDIRECT_URI:http://localhost:8080/auth/youtube/callback}

achievements:
  config-path: ${ACHIEVEMENTS_CONFIG_PATH:achievements.yml}
  images-path: ${ACHIEVEMENTS_IMAGES_PATH:achievement-images}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
